<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Fitness Videos - Exercise Categories</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>🏋️ Gym Fitness Videos</h1>
            <p>Exercise tutorials from Instagram pages</p>
        </div>
    </header>

    <nav class="category-nav">
        <div class="container">
            <button class="category-btn active" data-category="all">All</button>
            <button class="category-btn" data-category="shoulders">💪 Shoulders</button>
            <button class="category-btn" data-category="chest">🔥 Chest</button>
            <button class="category-btn" data-category="back">🔙 Back</button>
            <button class="category-btn" data-category="arms">💪 Arms</button>
            <button class="category-btn" data-category="legs">🦵 Legs</button>
            <button class="category-btn" data-category="core">🎯 Core</button>
            <button class="category-btn" data-category="form">⚠️ Form & Technique</button>
        </div>
    </nav>

    <main class="container">
        <section class="video-stats">
            <div class="stat">
                <span class="stat-number" id="totalVideos">0</span>
                <span class="stat-label">Videos</span>
            </div>
            <div class="stat">
                <span class="stat-number" id="totalCategories">0</span>
                <span class="stat-label">Categories</span>
            </div>
            <div class="stat">
                <span class="stat-number">2</span>
                <span class="stat-label">Sources</span>
            </div>
        </section>

        <section class="videos-grid" id="videosGrid">
            <!-- Videos will be dynamically inserted here -->
        </section>
    </main>

    <footer>
        <div class="container">
            <p>Built with ❤️ for fitness enthusiasts</p>
        </div>
    </footer>

    <div class="modal" id="videoModal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modalTitle"></h2>
            <div id="modalContent"></div>
            <div class="modal-tags" id="modalTags"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
